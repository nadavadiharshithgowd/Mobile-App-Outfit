name: outfit_stylist
description: AI Outfit Stylist & Virtual Try-On App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.6.2

  # Networking
  dio: ^5.4.3+1

  # Dependency Injection
  get_it: ^8.0.2

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.4

  # UI Components
  cached_network_image: ^3.4.1
  flutter_staggered_grid_view: ^0.7.0
  shimmer: ^3.0.0
  pinput: ^5.0.0
  flutter_svg: ^2.0.17
  percent_indicator: ^4.2.3

  # Image Handling
  image_picker: ^1.1.2
  image_cropper: ^8.0.2

  # Authentication
  google_sign_in: ^6.2.2

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  path: ^1.9.0
  mime: ^2.0.0

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
