# ============================================================
# Nginx Configuration — EC2 (Ubuntu 22.04)
# Place at: /etc/nginx/sites-available/outfit-stylist
# Enable:   sudo ln -s /etc/nginx/sites-available/outfit-stylist /etc/nginx/sites-enabled/
# ============================================================

upstream django_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

# ── Redirect HTTP → HTTPS ────────────────────────────────────
server {
    listen 80;
    server_name api.yourdomain.com;
    return 301 https://$host$request_uri;
}

# ── Main HTTPS server ────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.yourdomain.com;

    # SSL — use Certbot (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/api.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Security headers
    add_header X-Frame-Options           DENY;
    add_header X-Content-Type-Options    nosniff;
    add_header Referrer-Policy           strict-origin-when-cross-origin;

    # Max upload size (for person image uploads)
    client_max_body_size 20M;

    # ── Static files (Django collectstatic) ──────────────────
    location /static/ {
        alias /home/ubuntu/outfit-app/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── WebSocket (FastAPI / Django Channels) ────────────────
    location /ws/ {
        proxy_pass         http://django_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 86400;   # 24h — keep WS alive
        proxy_send_timeout 86400;
    }

    # ── Django REST API ──────────────────────────────────────
    location / {
        proxy_pass         http://django_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;
    }

    # ── Health check ─────────────────────────────────────────
    location /health/ {
        proxy_pass http://django_backend/api/v1/health/;
        access_log off;
    }

    # ── Gzip compression ─────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
}
